<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión — AlexitoFind</title>
  <link rel="icon" type="image/jpg" href="assets/img/logo.jpg">
  
  <!-- CSS Base & Design System -->
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  
  <style>
    body {
      background: var(--af-gray-50);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--af-s4);
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      animation: slideUp var(--af-slow) var(--af-spring) both;
    }

    .login-header {
      text-align: center;
      margin-bottom: var(--af-s8);
    }

    .login-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      background: var(--af-gradient);
      border-radius: var(--af-r-lg);
      margin-bottom: var(--af-s3);
      box-shadow: var(--af-shadow-brand);
      animation: heartbeat 2s ease-in-out infinite;
    }

    .login-title {
      font-family: var(--af-font-display);
      font-size: 1.875rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 6px;
    }

    .login-subtitle {
      font-size: 0.9375rem;
      color: var(--af-gray-500);
    }

    .login-card {
      background: white;
      border-radius: var(--af-r-2xl);
      padding: var(--af-s8);
      box-shadow: var(--af-shadow-lg);
      border: 1px solid var(--af-gray-100);
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: var(--af-s5);
    }

    .login-footer {
      text-align: center;
      margin-top: var(--af-s6);
      font-size: 0.875rem;
      color: var(--af-gray-500);
    }

    .login-footer a {
      color: var(--af-primary);
      font-weight: 600;
      transition: opacity var(--af-fast) var(--af-ease);
    }

    .login-footer a:hover {
      opacity: 0.8;
      text-decoration: underline;
    }

    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 12px;
      border: 2px solid var(--af-gray-200);
      border-radius: var(--af-r-lg);
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--af-gray-700);
      background: white;
      transition: all var(--af-base) var(--af-ease);
      cursor: pointer;
    }

    .social-btn:hover {
      border-color: var(--af-gray-400);
      background: var(--af-gray-50);
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-header">
      <div class="login-logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="white">
          <path d="M12 21.593c-5.63-5.539-11-10.297-11-14.402 0-3.791 3.068-5.191 5.281-5.191 1.312 0 4.151.501 5.719 4.457 1.59-3.968 4.464-4.447 5.726-4.447 2.54 0 5.274 1.621 5.274 5.181 0 4.069-5.136 8.625-11 14.402z"/>
        </svg>
      </div>
      <h2 class="login-title">Bienvenido de nuevo</h2>
      <p class="login-subtitle">Encuentra conexiones auténticas hoy</p>
    </div>

    <div class="login-card">
      <form class="login-form" id="loginForm" novalidate>
        <div class="af-input-group">
          <label class="af-label" for="email">Correo electrónico</label>
          <div class="af-input-wrapper">
            <span class="af-input-icon-left">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </span>
            <input class="af-input has-icon-left" type="email" id="email" placeholder="ejemplo@correo.com" required>
          </div>
          <div class="af-input-error" id="emailError" style="display:none"></div>
        </div>

        <div class="af-input-group">
          <label class="af-label" for="password">Contraseña</label>
          <div class="af-input-wrapper">
            <span class="af-input-icon-left">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </span>
            <input class="af-input has-icon-left has-icon-right" type="password" id="password" placeholder="••••••••" required>
            <span class="af-input-icon-right" id="togglePassword">
              <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </span>
          </div>
          <div class="af-input-error" id="passwordError" style="display:none"></div>
        </div>

        <div style="display:flex;align-items:center;justify-content:space-between;font-size:0.875rem">
          <label style="display:inline-flex;align-items:center;gap:8px;cursor:pointer;user-select:none">
            <input type="checkbox" id="rememberMe" style="accent-color:var(--af-primary)">
            <span style="color:var(--af-gray-600)">Recordarme</span>
          </label>
          <a href="#" style="color:var(--af-primary);font-weight:600">¿Olvidaste tu contraseña?</a>
        </div>

        <button class="af-btn af-btn-primary af-btn-full" type="submit" id="submitBtn">
          <span>Iniciar Sesión</span>
        </button>

        <div class="af-divider-text">o continuar con</div>

        <button type="button" class="social-btn" id="googleLoginBtn">
          <svg width="18" height="18" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/>
          </svg>
          Google
        </button>
      </form>
    </div>

    <div class="login-footer">
      ¿No tienes cuenta? <a href="register.html">Regístrate gratis</a>
    </div>
  </div>

  <!-- Component scripts -->
  <script src="assets/js/data.js"></script>
  <script src="assets/js/components.js"></script>
  
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('loginForm');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const emailError = document.getElementById('emailError');
      const passwordError = document.getElementById('passwordError');
      const togglePassword = document.getElementById('togglePassword');
      const eyeIcon = document.getElementById('eyeIcon');
      
      // Focus first input automatically
      emailInput.focus();

      // Show/hide password
      togglePassword.addEventListener('click', () => {
        const isPrivate = passwordInput.getAttribute('type') === 'password';
        passwordInput.setAttribute('type', isPrivate ? 'text' : 'password');
        
        // Update eye icon
        if (isPrivate) {
          eyeIcon.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`;
        } else {
          eyeIcon.innerHTML = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
        }
      });

      // Google OAuth simulation
      document.getElementById('googleLoginBtn').addEventListener('click', () => {
        Loader.show('Conectando con Google...');
        setTimeout(() => {
          Loader.hide();
          localStorage.setItem('af_logged_in', 'true');
          Toast.success('Sesión iniciada con Google');
          setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
        }, 1500);
      });

      // Validate on submit
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        
        let isValid = true;
        
        // Reset styles
        emailInput.classList.remove('is-error');
        passwordInput.classList.remove('is-error');
        emailError.style.display = 'none';
        passwordError.style.display = 'none';

        // Check email
        const emailVal = emailInput.value.trim();
        if (!emailVal) {
          emailInput.classList.add('is-error');
          emailError.textContent = 'El correo electrónico es requerido';
          emailError.style.display = 'flex';
          isValid = false;
        } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailVal)) {
          emailInput.classList.add('is-error');
          emailError.textContent = 'Ingresa un correo electrónico válido';
          emailError.style.display = 'flex';
          isValid = false;
        }

        // Check password
        const passwordVal = passwordInput.value.trim();
        if (!passwordVal) {
          passwordInput.classList.add('is-error');
          passwordError.textContent = 'La contraseña es requerida';
          passwordError.style.display = 'flex';
          isValid = false;
        } else if (passwordVal.length < 5) {
          passwordInput.classList.add('is-error');
          passwordError.textContent = 'La contraseña debe tener al menos 5 caracteres';
          passwordError.style.display = 'flex';
          isValid = false;
        }

        if (isValid) {
          Loader.show('Verificando credenciales...');
          
          setTimeout(() => {
            Loader.hide();
            // Default demo credentials or any valid inputs
            if (emailVal === 'alexito@alexitofind.app' && passwordVal === 'alexito') {
              localStorage.setItem('af_logged_in', 'true');
              Toast.success('¡Bienvenido, Alexito!');
              setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
            } else {
              // Simulating successful login for developer convenience, but showing alert
              localStorage.setItem('af_logged_in', 'true');
              Toast.success('Inicio de sesión exitoso (Modo Demo)');
              setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
            }
          }, 1200);
        }
      });
    });
  </script>
</body>
</html>
