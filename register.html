<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrarse — AlexitoFind</title>
  <link rel="icon" type="image/jpg" href="assets/img/logo.jpg">
  
  <!-- CSS Base & Design System -->
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  
  <style>
    body {
      background: var(--af-gray-50);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--af-s4);
    }

    .register-container {
      width: 100%;
      max-width: 440px;
      animation: slideUp var(--af-slow) var(--af-spring) both;
    }

    .register-header {
      text-align: center;
      margin-bottom: var(--af-s6);
    }

    .register-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      background: var(--af-gradient);
      border-radius: var(--af-r-lg);
      margin-bottom: var(--af-s3);
      box-shadow: var(--af-shadow-brand);
    }

    .register-title {
      font-family: var(--af-font-display);
      font-size: 1.875rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 6px;
    }

    .register-subtitle {
      font-size: 0.9375rem;
      color: var(--af-gray-500);
    }

    .register-card {
      background: white;
      border-radius: var(--af-r-2xl);
      padding: var(--af-s6);
      box-shadow: var(--af-shadow-lg);
      border: 1px solid var(--af-gray-100);
    }

    .register-form {
      display: flex;
      flex-direction: column;
      gap: var(--af-s4);
    }

    .register-footer {
      text-align: center;
      margin-top: var(--af-s6);
      font-size: 0.875rem;
      color: var(--af-gray-500);
    }

    .register-footer a {
      color: var(--af-primary);
      font-weight: 600;
      transition: opacity var(--af-fast) var(--af-ease);
    }

    .register-footer a:hover {
      opacity: 0.8;
      text-decoration: underline;
    }

    .terms-text {
      font-size: 0.8rem;
      color: var(--af-gray-500);
      line-height: 1.4;
    }
  </style>
</head>
<body>

  <div class="register-container">
    <div class="register-header">
      <div class="register-logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="white">
          <path d="M12 21.593c-5.63-5.539-11-10.297-11-14.402 0-3.791 3.068-5.191 5.281-5.191 1.312 0 4.151.501 5.719 4.457 1.59-3.968 4.464-4.447 5.726-4.447 2.54 0 5.274 1.621 5.274 5.181 0 4.069-5.136 8.625-11 14.402z"/>
        </svg>
      </div>
      <h2 class="register-title">Crear Cuenta</h2>
      <p class="register-subtitle">Únete a la comunidad más grande de descubrimiento</p>
    </div>

    <div class="register-card">
      <form class="register-form" id="registerForm" novalidate>
        <div class="af-input-group">
          <label class="af-label" for="name">Nombre completo</label>
          <div class="af-input-wrapper">
            <span class="af-input-icon-left">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </span>
            <input class="af-input has-icon-left" type="text" id="name" placeholder="Tu nombre" required>
          </div>
          <div class="af-input-error" id="nameError" style="display:none"></div>
        </div>

        <div class="af-input-group">
          <label class="af-label" for="email">Correo electrónico</label>
          <div class="af-input-wrapper">
            <span class="af-input-icon-left">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </span>
            <input class="af-input has-icon-left" type="email" id="email" placeholder="ejemplo@correo.com" required>
          </div>
          <div class="af-input-error" id="emailError" style="display:none"></div>
        </div>

        <div style="display:grid;grid-template-columns:1fr;gap:var(--af-s4)">
          <div class="af-input-group">
            <label class="af-label" for="birthdate">Fecha de nacimiento</label>
            <div class="af-input-wrapper">
              <span class="af-input-icon-left">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              </span>
              <input class="af-input has-icon-left" type="date" id="birthdate" required>
            </div>
            <div class="af-input-error" id="birthdateError" style="display:none"></div>
          </div>
        </div>

        <div class="af-input-group">
          <label class="af-label" for="password">Contraseña</label>
          <div class="af-input-wrapper">
            <span class="af-input-icon-left">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </span>
            <input class="af-input has-icon-left" type="password" id="password" placeholder="Mínimo 6 caracteres" required>
          </div>
          <div class="af-input-error" id="passwordError" style="display:none"></div>
        </div>

        <div style="display:flex;align-items:flex-start;gap:10px;margin-top:4px">
          <input type="checkbox" id="terms" style="accent-color:var(--af-primary);margin-top:3px" required>
          <label class="terms-text" for="terms">
            Acepto los <a href="#" style="color:var(--af-primary);font-weight:600">Términos de servicio</a> y la <a href="#" style="color:var(--af-primary);font-weight:600">Política de privacidad</a> de AlexitoFind.
          </label>
        </div>
        <div class="af-input-error" id="termsError" style="display:none"></div>

        <button class="af-btn af-btn-primary af-btn-full" type="submit" id="submitBtn">
          <span>Registrarse</span>
        </button>
      </form>
    </div>

    <div class="register-footer">
      ¿Ya tienes una cuenta? <a href="login.html">Inicia sesión</a>
    </div>
  </div>

  <!-- Component scripts -->
  <script src="assets/js/data.js"></script>
  <script src="assets/js/components.js"></script>
  
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('registerForm');
      const nameInput = document.getElementById('name');
      const emailInput = document.getElementById('email');
      const birthdateInput = document.getElementById('birthdate');
      const passwordInput = document.getElementById('password');
      const termsInput = document.getElementById('terms');

      const nameError = document.getElementById('nameError');
      const emailError = document.getElementById('emailError');
      const birthdateError = document.getElementById('birthdateError');
      const passwordError = document.getElementById('passwordError');
      const termsError = document.getElementById('termsError');

      // Autofocus first input
      nameInput.focus();

      // Submit listener
      form.addEventListener('submit', (e) => {
        e.preventDefault();

        let isValid = true;

        // Reset error messages and borders
        [nameInput, emailInput, birthdateInput, passwordInput].forEach(inp => inp.classList.remove('is-error'));
        [nameError, emailError, birthdateError, passwordError, termsError].forEach(err => err.style.display = 'none');

        // Validate name
        const nameVal = nameInput.value.trim();
        if (!nameVal) {
          nameInput.classList.add('is-error');
          nameError.textContent = 'El nombre es obligatorio';
          nameError.style.display = 'flex';
          isValid = false;
        }

        // Validate email
        const emailVal = emailInput.value.trim();
        if (!emailVal) {
          emailInput.classList.add('is-error');
          emailError.textContent = 'El correo electrónico es obligatorio';
          emailError.style.display = 'flex';
          isValid = false;
        } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailVal)) {
          emailInput.classList.add('is-error');
          emailError.textContent = 'Ingresa un correo electrónico válido';
          emailError.style.display = 'flex';
          isValid = false;
        }

        // Validate birthdate (Must be 18+ years old)
        const birthdateVal = birthdateInput.value;
        if (!birthdateVal) {
          birthdateInput.classList.add('is-error');
          birthdateError.textContent = 'La fecha de nacimiento es obligatoria';
          birthdateError.style.display = 'flex';
          isValid = false;
        } else {
          const birthDate = new Date(birthdateVal);
          const today = new Date();
          let age = today.getFullYear() - birthDate.getFullYear();
          const m = today.getMonth() - birthDate.getMonth();
          if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
            age--;
          }
          if (age < 18) {
            birthdateInput.classList.add('is-error');
            birthdateError.textContent = 'Debes tener al menos 18 años para usar esta aplicación';
            birthdateError.style.display = 'flex';
            isValid = false;
          }
        }

        // Validate password
        const passwordVal = passwordInput.value.trim();
        if (!passwordVal) {
          passwordInput.classList.add('is-error');
          passwordError.textContent = 'La contraseña es obligatoria';
          passwordError.style.display = 'flex';
          isValid = false;
        } else if (passwordVal.length < 6) {
          passwordInput.classList.add('is-error');
          passwordError.textContent = 'La contraseña debe tener al menos 6 caracteres';
          passwordError.style.display = 'flex';
          isValid = false;
        }

        // Validate terms
        if (!termsInput.checked) {
          termsError.textContent = 'Debes aceptar los términos y condiciones';
          termsError.style.display = 'flex';
          isValid = false;
        }

        if (isValid) {
          Loader.show('Creando tu cuenta...');
          
          setTimeout(() => {
            Loader.hide();
            // Simulate saving user state
            localStorage.setItem('af_logged_in', 'true');
            Toast.success('¡Registro exitoso! Creando perfil...');
            
            setTimeout(() => {
              window.location.href = 'dashboard.html';
            }, 1000);
          }, 1500);
        }
      });
    });
  </script>
</body>
</html>
