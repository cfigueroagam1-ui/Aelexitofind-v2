<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Perfil — AlexitoFind</title>
  <link rel="icon" type="image/jpg" href="assets/img/logo.jpg">
  
  <!-- CSS Base & Design System -->
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  
  <style>
    .profile-layout {
      max-width: 580px;
      margin: 0 auto;
      padding: var(--af-s5) var(--af-s4) var(--af-s16);
      display: flex;
      flex-direction: column;
      gap: var(--af-s6);
    }

    /* Top profile card header */
    .profile-hero {
      background: white;
      border-radius: var(--af-r-2xl);
      padding: var(--af-s6);
      border: 1px solid var(--af-gray-100);
      box-shadow: var(--af-shadow-sm);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    .hero-avatar-wrap {
      position: relative;
      margin-bottom: var(--af-s4);
    }

    .hero-avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid white;
      box-shadow: var(--af-shadow-md);
    }

    .verified-badge {
      position: absolute;
      bottom: 2px;
      right: 2px;
      background: white;
      border-radius: 50%;
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--af-shadow-sm);
    }

    .hero-name {
      font-family: var(--af-font-display);
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--af-dark);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .hero-location {
      font-size: 0.875rem;
      color: var(--af-gray-500);
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Stats row */
    .profile-stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      width: 100%;
      border-top: 1px solid var(--af-gray-100);
      margin-top: var(--af-s5);
      padding-top: var(--af-s5);
    }

    /* Photos list */
    .photo-add-card {
      background: var(--af-gray-100);
      border: 2px dashed var(--af-gray-300);
      border-radius: var(--af-r-xl);
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--af-gray-500);
      font-size: 0.8125rem;
      font-weight: 600;
      gap: 6px;
      transition: all var(--af-base) var(--af-ease);
    }

    .photo-add-card:hover {
      background: rgba(253,38,122,0.05);
      border-color: var(--af-primary);
      color: var(--af-primary);
    }

    /* Modal inputs styling */
    .edit-modal-form {
      display: flex;
      flex-direction: column;
      gap: var(--af-s4);
    }
  </style>
</head>
<body>

  <div class="af-page">
    <!-- Topbar for Mobile -->
    <header class="af-topbar af-mobile-only" role="banner">
      <div class="af-topbar-inner">
        <div class="af-topbar-logo">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="var(--af-primary)">
            <path d="M12 21.593c-5.63-5.539-11-10.297-11-14.402 0-3.791 3.068-5.191 5.281-5.191 1.312 0 4.151.501 5.719 4.457 1.59-3.968 4.464-4.447 5.726-4.447 2.54 0 5.274 1.621 5.274 5.181 0 4.069-5.136 8.625-11 14.402z"/>
          </svg>
          <span class="af-topbar-logo-text">AlexitoFind</span>
        </div>
      </div>
    </header>

    <!-- Sidebar injected here -->
    <div id="sidebar-container"></div>

    <!-- Main Content Area -->
    <main class="af-page-content" role="main">
      <div class="profile-layout">
        
        <!-- Hero Profile Card -->
        <section class="profile-hero">
          <div class="hero-avatar-wrap">
            <img class="hero-avatar" src="" alt="Alexito" id="p-avatar">
            <div class="verified-badge" id="p-verified" style="display:none">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#00C897" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
            </div>
          </div>
          
          <h2 class="hero-name" id="p-name">Cargando...</h2>
          
          <div class="hero-location" id="p-location">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
            <span>-</span>
          </div>

          <div style="margin-top:var(--af-s4); display:flex; gap:8px">
            <button class="af-btn af-btn-ghost af-btn-sm" onclick="openEditModal()">
              <span>Editar Perfil</span>
            </button>
          </div>

          <!-- Stats Row -->
          <div class="profile-stats-row">
            <div class="af-stat">
              <span class="af-stat-value" id="p-stat-matches">0</span>
              <span class="af-stat-label">Matches</span>
            </div>
            <div class="af-stat" style="border-left:1px solid var(--af-gray-100); border-right:1px solid var(--af-gray-100)">
              <span class="af-stat-value" id="p-stat-likes">0</span>
              <span class="af-stat-label">Me Gusta</span>
            </div>
            <div class="af-stat">
              <span class="af-stat-value" id="p-stat-views">0</span>
              <span class="af-stat-label">Visitas</span>
            </div>
          </div>
        </section>

        <!-- Gallery / Photos Section -->
        <section class="af-info-card">
          <div class="af-section-header">
            <h3 class="af-section-title">Mis Fotos</h3>
            <span class="af-section-label" style="font-size:0.75rem; color:var(--af-gray-400)">Máx. 6 fotos</span>
          </div>
          
          <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:12px; margin-top:8px;" id="photos-grid">
            <!-- User Photos loaded here dynamically -->
            <div class="photo-add-card" onclick="triggerAddPhoto()" id="add-photo-btn">
              <span style="font-size:1.5rem">+</span>
              <span>Añadir</span>
            </div>
          </div>
        </section>

        <!-- Biography Section -->
        <section class="af-info-card">
          <div class="af-section-header">
            <h3 class="af-section-title">Biografía</h3>
          </div>
          <p id="p-bio" style="font-size:0.9rem; color:var(--af-gray-700); line-height:1.6; white-space:pre-wrap;">-</p>
        </section>

        <!-- Interests Section -->
        <section class="af-info-card">
          <div class="af-section-header">
            <h3 class="af-section-title">Mis Intereses</h3>
            <span class="af-section-link" onclick="openInterestsModal()">Editar</span>
          </div>
          <div style="display:flex; flex-wrap:wrap; gap:8px; margin-top:8px" id="p-interests">
            <!-- Loaded dynamically -->
          </div>
        </section>

      </div>
    </main>

    <!-- Bottom Navigation for Mobile -->
    <div id="bottom-nav-container"></div>
  </div>

  <!-- Hidden Custom Edit Profile Modal Overlay -->
  <div class="af-modal-overlay" id="editProfileModal">
    <div class="af-modal">
      <div class="af-modal-handle" onclick="closeEditModal()"></div>
      <h3 class="af-modal-title">Editar Perfil</h3>
      <div class="af-modal-body">
        <form class="edit-modal-form" id="editProfileForm">
          <div class="af-input-group">
            <label class="af-label" for="edit-name">Nombre</label>
            <input class="af-input" type="text" id="edit-name" required>
          </div>
          <div class="af-input-group">
            <label class="af-label" for="edit-lastname">Apellido</label>
            <input class="af-input" type="text" id="edit-lastname" required>
          </div>
          <div class="af-input-group">
            <label class="af-label" for="edit-bio">Biografía</label>
            <textarea class="af-input af-textarea" id="edit-bio" rows="4" required></textarea>
          </div>
          <div class="af-input-group">
            <label class="af-label" for="edit-city">Ciudad</label>
            <input class="af-input" type="text" id="edit-city" required>
          </div>
          
          <div style="display:flex; gap:12px; margin-top:12px">
            <button type="button" class="af-btn af-btn-secondary af-btn-full" onclick="closeEditModal()">Cancelar</button>
            <button type="submit" class="af-btn af-btn-primary af-btn-full">Guardar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Predefined Pre-selected Interests Modal -->
  <div class="af-modal-overlay" id="editInterestsModal">
    <div class="af-modal">
      <div class="af-modal-handle" onclick="closeInterestsModal()"></div>
      <h3 class="af-modal-title">Intereses</h3>
      <div class="af-modal-body">
        <p style="font-size:0.8rem;color:var(--af-gray-500);margin-bottom:16px">Selecciona los intereses que te identifican:</p>
        <div style="display:flex; flex-wrap:wrap; gap:8px; max-height:220px; overflow-y:auto; padding:4px;" id="interests-selection-list">
          <!-- pre-defined interests checkboxes -->
        </div>
        <div style="display:flex; gap:12px; margin-top:20px">
          <button type="button" class="af-btn af-btn-secondary af-btn-full" onclick="closeInterestsModal()">Cancelar</button>
          <button type="button" class="af-btn af-btn-primary af-btn-full" onclick="saveInterests()">Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Component scripts -->
  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/components.js"></script>

  <script>
    const availableInterests = [
      '🎵 Música', '✈️ Viajes', '📸 Fotografía', '🍕 Gastronomía', '🎮 Gaming', 
      '🏋️ Fitness', '🎨 Arte', '☕ Café', '🌊 Playa', '📚 Lectura', 
      '💃 Baile', '🧠 Psicología', '🎬 Cine', '🍜 Cocina', '🧘 Yoga', 
      '🏔️ Montañismo', '🏄 Surf', '🚀 Startups'
    ];

    let selectedInterests = [];

    document.addEventListener('DOMContentLoaded', () => {
      // Check auth
      if (localStorage.getItem('af_logged_in') !== 'true') {
        window.location.href = 'login.html';
        return;
      }

      // Render components
      document.getElementById('sidebar-container').innerHTML = buildSidebar('profile');
      document.getElementById('bottom-nav-container').innerHTML = buildBottomNav('profile');
      Navigation.updateBadges();

      // Read profile data
      loadProfileData();

      // Hook submit form
      document.getElementById('editProfileForm').addEventListener('submit', (e) => {
        e.preventDefault();
        
        const name = document.getElementById('edit-name').value.trim();
        const lastName = document.getElementById('edit-lastname').value.trim();
        const bio = document.getElementById('edit-bio').value.trim();
        const city = document.getElementById('edit-city').value.trim();

        if (name && lastName && bio && city) {
          CURRENT_USER.name = name;
          CURRENT_USER.lastName = lastName;
          CURRENT_USER.bio = bio;
          CURRENT_USER.city = city;

          loadProfileData();
          closeEditModal();
          Toast.success('Perfil actualizado correctamente');
        }
      });
    });

    function loadProfileData() {
      const u = CURRENT_USER;
      
      // Update Hero Card
      document.getElementById('p-avatar').src = u.avatar;
      document.getElementById('p-avatar').onerror = () => { document.getElementById('p-avatar').src = generateAvatarSVG(u.name, 110); };
      
      if (u.verified) {
        document.getElementById('p-verified').style.display = 'flex';
      }

      document.getElementById('p-name').innerHTML = `${u.name} ${u.lastName}, ${u.age} ${u.premium ? '<span style="font-size:0.75rem;background:linear-gradient(90deg, #F59E0B 0%, #D97706 100%);color:white;padding:3px 8px;border-radius:99px;font-weight:700;margin-left:6px">PLUS</span>' : ''}`;
      document.getElementById('p-location').querySelector('span').textContent = `${u.city}, ${u.country}`;

      // Load Stats
      document.getElementById('p-stat-matches').textContent = u.stats.matches;
      document.getElementById('p-stat-likes').textContent = u.stats.likes;
      document.getElementById('p-stat-views').textContent = u.stats.views;

      // Load Bio
      document.getElementById('p-bio').textContent = u.bio;

      // Load Interests
      const interestsWrap = document.getElementById('p-interests');
      interestsWrap.innerHTML = u.interests.map(i => `<span class="af-chip">${i}</span>`).join('');
      selectedInterests = [...u.interests];

      // Load Gallery
      renderGallery();
    }

    function renderGallery() {
      const grid = document.getElementById('photos-grid');
      const addCard = document.getElementById('add-photo-btn');
      
      // Clean existing photos but keep the add button
      grid.querySelectorAll('.af-photo-grid-item').forEach(el => el.remove());

      CURRENT_USER.photos.forEach((photoUrl, idx) => {
        const item = document.createElement('div');
        item.className = 'af-photo-grid-item af-hover-scale';
        item.style.position = 'relative';
        item.style.borderRadius = 'var(--af-r-xl)';
        item.style.overflow = 'hidden';
        item.style.aspectRatio = '1';
        item.innerHTML = `
          <img src="${photoUrl}" alt="Foto ${idx + 1}" style="width:100%;height:100%;object-fit:cover"
            onerror="this.src='${generateAvatarSVG(CURRENT_USER.name, 120)}'">
          ${idx > 0 ? `<button onclick="deletePhoto(${idx}); event.stopPropagation();" 
            style="position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.5);color:white;
                   border-radius:50%;width:22px;height:22px;display:flex;align-items:center;
                   justify-content:center;font-size:10px;font-weight:700">✕</button>` : ''}
        `;
        grid.insertBefore(item, addCard);
      });

      // Hide add button if maximum pictures (6) reached
      if (CURRENT_USER.photos.length >= 6) {
        addCard.style.display = 'none';
      } else {
        addCard.style.display = 'flex';
      }
    }

    function deletePhoto(idx) {
      CURRENT_USER.photos.splice(idx, 1);
      renderGallery();
      Toast.show('🗑️ Foto eliminada', 'default', 1800);
    }

    function triggerAddPhoto() {
      // Predefined sample images to simulate upload
      const simulatedImages = [
        'https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=400&q=80',
        'https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=400&q=80',
        'https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?w=400&q=80',
        'https://images.unsplash.com/photo-1472214222541-d510753a49fa?w=400&q=80'
      ];
      
      const nextPhoto = simulatedImages[Math.floor(Math.random() * simulatedImages.length)];
      
      Loader.show('Subiendo foto...');
      setTimeout(() => {
        Loader.hide();
        CURRENT_USER.photos.push(nextPhoto);
        renderGallery();
        Toast.success('Foto subida con éxito');
      }, 1200);
    }

    // Modal Edit Profile Controllers
    function openEditModal() {
      const u = CURRENT_USER;
      document.getElementById('edit-name').value = u.name;
      document.getElementById('edit-lastname').value = u.lastName;
      document.getElementById('edit-bio').value = u.bio;
      document.getElementById('edit-city').value = u.city;

      Modal.open('editProfileModal');
    }

    function closeEditModal() {
      Modal.close('editProfileModal');
    }

    // Modal Interests Controllers
    function openInterestsModal() {
      const list = document.getElementById('interests-selection-list');
      
      list.innerHTML = availableInterests.map(interest => {
        const isSelected = selectedInterests.includes(interest);
        return `
          <div class="af-interest-pill${isSelected ? ' selected' : ''}" 
               onclick="toggleInterestSelection(this, '${interest}')">
            ${interest}
          </div>
        `;
      }).join('');

      Modal.open('editInterestsModal');
    }

    function toggleInterestSelection(element, interest) {
      if (selectedInterests.includes(interest)) {
        selectedInterests = selectedInterests.filter(i => i !== interest);
        element.classList.remove('selected');
      } else {
        selectedInterests.push(interest);
        element.classList.add('selected');
      }
    }

    function closeInterestsModal() {
      Modal.close('editInterestsModal');
    }

    function saveInterests() {
      CURRENT_USER.interests = [...selectedInterests];
      loadProfileData();
      closeInterestsModal();
      Toast.success('Intereses actualizados');
    }
  </script>
</body>
</html>
